services:
  postgres-source:
    image: postgres:16-alpine
    container_name: task1314-postgres-source
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-source-data:/var/lib/postgresql/data
      - ./sql:/sql
      - ./transfer:/transfer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: task1314-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: task1314-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/etl-bucket &&
      mc anonymous set download local/etl-bucket
      "

  airflow-webserver:
    image: apache/airflow:2.9.2-python3.11
    container_name: task1314-airflow-webserver
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Local --lastname Admin --role Admin --email admin@example.com || true &&
      airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.9.2-python3.11
    container_name: task1314-airflow-scheduler
    depends_on:
      airflow-webserver:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    user: "0:0"
    volumes:
      - ./airflow:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: >
      bash -c "
      sleep 20 &&
      airflow db check &&
      airflow scheduler
      "

  mc:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: task1314-mc
    profiles:
      - tools
    depends_on:
      postgres-source:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./transfer:/transfer
    entrypoint: /bin/sh

volumes:
  postgres-source-data:
  minio-data:
