services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: task15-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      - /bin/bash
      - -lc
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:29092 \
          --create \
          --if-not-exists \
          --topic etl_practice_events \
          --partitions 1 \
          --replication-factor 1
        /opt/kafka/bin/kafka-console-producer.sh \
          --bootstrap-server kafka:29092 \
          --topic etl_practice_events < /workspace/data/messages.jsonl
        echo "Finished sending messages to topic 'etl_practice_events'."

  spark-reader:
    image: bitnami/spark:3.5.1
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC: "etl_practice_events"
      HOME: "/tmp"
    command:
      - /opt/bitnami/spark/bin/spark-submit
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      - /workspace/app/spark_read_kafka.py
